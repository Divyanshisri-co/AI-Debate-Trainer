<!DOCTYPE html>
<html>
<head>
    <title>AI Debate</title>

     <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #834784;
    }

    /* MAIN CARD */
    .container {
        width: 1000px;
        height: 700px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        padding: 18px;
        position: relative;
        transition: 0.3s;
    }

    .container:hover {
        transform: translateY(-3px);
        
    }

    /* TOPIC */
    .topic-box {
        border: 2px solid #22c55e;
        padding: 10px;
        text-align: center;
        font-weight: 600;
        border-radius: 8px;
        width: 75%;
        margin: 0 auto;
        background: #f0fdf4;
    }

    /* TIMER */
    .timer-box {
        position: absolute;
        top: 18px;
        right: 18px;
        background: #22c55e;
        color: white;
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
    }

    /* CHAT AREA */
    .chat-box {
        flex: 1;
        margin: 20px 0;
        padding: 12px;
        overflow-y: auto;
        background: rgb(251, 248, 252);
        border-radius: 10px;
        border: 1px solid #e2e8f0;
    }

    /* MESSAGE BUBBLES */
    .message {
        max-width: 70%;
        padding: 10px 14px;
        margin: 6px 0;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.4;
        animation: fadeIn 0.2s ease-in;
    }

    .user {
        background: #22c55e;
        color: white;
        margin-left: auto;
        border-bottom-right-radius: 4px;
    }

    .ai {
        background: #e2e8f0;
        color: #111;
        margin-right: auto;
        border-bottom-left-radius: 4px;
    }

    .corrected {
        font-size: 12px;
        color: #ef4444;
        margin: 2px 6px;
    }

    /* INPUT AREA */
    .input-area {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .input-area input {
        flex: 1;
        padding: 12px;
        border: 2px solid #22c55e;
        border-radius: 8px;
        outline: none;
        font-size: 14px;
        transition: 0.2s;
    }

    .input-area input:focus {
        border-color: #16a34a;
        box-shadow: 0 0 5px rgba(34,197,94,0.4);
    }

    /* SEND BUTTON */
    .input-area button {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        border: none;
        background: #22c55e;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .input-area button:hover {
        background: #16a34a;
        transform: scale(1.05);
    }

    /* SCROLLBAR */
    .chat-box::-webkit-scrollbar {
        width: 5px;
    }

    .chat-box::-webkit-scrollbar-thumb {
        background: #cbd5f5;
        border-radius: 10px;
    }

    /* ANIMATION */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="container">

    <div class="topic-box">
        {{ topic }}
    </div>

    <div class="timer-box" id="timer">
        {{ time }}s
    </div>

    <div id="chat-box" class="chat-box">
    </div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Type argument">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

let timeLeft = {{ time|default:180 }};

// ✅ START TIMER
function startTimer() {
    const timerDisplay = document.getElementById("timer");

    const interval = setInterval(() => {
        timeLeft--;
        timerDisplay.innerText = timeLeft + "s";

        if (timeLeft <= 0) {
            clearInterval(interval);
            window.location.href = "/result/";
        }
    }, 1000);
}

// ✅ DISPLAY MESSAGE
function displayMessage(sender, text) {
    const chatBox = document.getElementById("chat-box");

    const msg = document.createElement("div");
    msg.classList.add("message");

    if (sender === "You") msg.classList.add("user");
    else if (sender === "AI") msg.classList.add("ai");
    else msg.classList.add("correction");

    msg.innerHTML = `<b>${sender}:</b> ${text}`;
    chatBox.appendChild(msg);

    chatBox.scrollTop = chatBox.scrollHeight;
}

// ✅ GET CSRF TOKEN
function getCSRFToken() {
    let cookieValue = null;
    const cookies = document.cookie.split(';');

    for (let i = 0; i < cookies.length; i++) {
        let cookie = cookies[i].trim();
        if (cookie.startsWith("csrftoken=")) {
            cookieValue = cookie.substring("csrftoken=".length);
        }
    }
    return cookieValue;
}

// ✅ SEND MESSAGE
function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    displayMessage("You", text);

    fetch("/chat_api/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCSRFToken()
        },
        body: "message=" + encodeURIComponent(text)
    })
    .then(response => response.json())
    .then(data => {
        displayMessage("AI", data.reply);

        if (data.corrected && data.corrected !== text) {
            displayMessage("Correction", data.corrected);
        }
    })
    .catch(error => {
        console.error(error);
        alert("Error sending message");
    });

    input.value = "";
}

// ✅ ENTER KEY SUPPORT
document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

// ✅ RUN TIMER
window.onload = startTimer;

</script>

</body>
</html>
